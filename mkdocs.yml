site_name: PowerPlatform Wiki
site_url: https://powerplatform.wiki
site_description: A structured knowledge platform for enterprise-grade Microsoft Power Platform governance, architecture, and scalable implementation.
site_author: Kunal Murarka

repo_name: murarka-kunal/powerplatform-wiki
repo_url: https://github.com/murarka-kunal/powerplatform-wiki

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - custom.css

plugins:
  - search
  - tags
  - meta

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/murarka-kunal/powerplatform-wiki
