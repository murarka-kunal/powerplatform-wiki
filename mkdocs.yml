site_name: PowerPlatform Wiki
site_url: https://powerplatform.wiki
site_description: A structured knowledge platform for enterprise-grade Microsoft Power Platform governance, architecture, and scalable implementation.
site_author: Kunal Murarka


theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - custom.css

extra_javascript:
  - share.js


plugins:
  - search
  - tags
  - meta
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/kunalmurarka/
      name: Kunal Murarka on LinkedIn

copyright: Built by <a href="https://www.linkedin.com/in/kunalmurarka/" target="_blank" rel="noopener">Kunal Murarka</a>
