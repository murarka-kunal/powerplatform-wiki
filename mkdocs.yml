site_name: PowerPlatform Wiki
site_url: https://powerplatform.wiki
site_description: A structured knowledge platform for enterprise-grade Microsoft Power Platform governance, architecture, and scalable implementation.
site_author: Kunal Murarka


theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - custom.css

extra_javascript:
  - share.js


plugins:
  - search
  - tags
  - meta
  - awesome-pages

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/kunalmurarka/
      name: Kunal Murarka on LinkedIn

copyright: Built by <a href="https://www.linkedin.com/in/kunalmurarka/" target="_blank" rel="noopener">Kunal Murarka</a>

nav:
  - Home: index.html
  - SCALE-OPS:
    - Overview: scale-ops/index.md
    - Stewardship: scale-ops/stewardship.md
    - Containment: scale-ops/containment.md
    - Automation: scale-ops/automation.md
    - Lifecycle: scale-ops/lifecycle.md
    - Enablement: scale-ops/enablement.md
    - Operations: scale-ops/operations.md
    - Performance: scale-ops/performance.md
    - Scalability: scale-ops/scalability.md
  - Governance:
    - Overview: governance/index.md
    - Environment Strategy: governance/environment-strategy.md
    - DLP Policies: governance/dlp-policies.md
    - Admin Roles: governance/admin-roles.md
    - CoE Setup: governance/coe-setup.md
  - DevOps & ALM:
    - Overview: devops/index.md
    - ALM Strategy: devops/alm-strategy.md
    - Pipelines: devops/pipelines.md
    - Branching Strategy: devops/branching.md
  - Copilot Studio:
    - Overview: copilot-studio/index.md
    - Architecture: copilot-studio/architecture.md
    - Topics & Actions: copilot-studio/topics-actions.md
    - Governance: copilot-studio/governance.md
  - Dataverse:
    - Overview: dataverse/index.md
    - Data Modeling: dataverse/data-modeling.md
    - Performance: dataverse/performance.md
  - Security:
    - Overview: security/index.md
    - DLP: security/dlp.md
    - RBAC: security/rbac.md
    - Conditional Access: security/conditional-access.md
  - Monitoring:
    - Overview: monitoring/index.md
    - CoE Toolkit: monitoring/coe-toolkit.md
    - Alerting: monitoring/alerting.md
  - Changelog: changelog.md
